name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash -l {0}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # --------------------
    # Minimal, robust LaTeX
    # --------------------
    - name: Install minimal LaTeX
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          texlive-base \
          texlive-latex-base \
          texlive-latex-recommended \
          texlive-fonts-recommended

    # --------------------
    # Conda / Mamba setup
    # --------------------
    - name: Set up Conda
      uses: conda-incubator/setup-miniconda@v3
      with:
        miniforge-version: latest
        use-mamba: true
        activate-environment: cadet-equations
        channels: conda-forge

    # --------------------
    # Cache Conda env
    # --------------------
    - name: Cache Conda environment
      id: conda-cache
      uses: actions/cache@v4
      with:
        path: ${{ env.CONDA }}/envs/cadet-equations
        key: conda-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          conda-${{ runner.os }}-

    # --------------------
    # Environment install
    # --------------------
    - name: Update environment
      if: steps.conda-cache.outputs.cache-hit != 'true'
      run: |
        conda install -n cadet-equations -y python=3.10 "setuptools>=69" "pip>=24"
        conda run -n cadet-equations pip install -r requirements.txt

    # --------------------
    # Tests
    # --------------------
    - name: Run unit tests with coverage
      run: |
        conda run -n cadet-equations pytest -m "ci and (unit_test or reference)" \
          --cov=src \
          --cov=Equation-Generator.py \
          --cov-report=xml:coverage.xml \
          --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: coverage.xml
        flags: unit
        fail_ci_if_error: false

    - name: Run integration tests without coverage
      run: |
        conda run -n cadet-equations pytest -m "ci and all_config_runs"
