name: Bug Report
description: Report an issue with CADET-Equations
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe what happened and what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Select model '...'
        2. Set parameter '...' to '...'
        3. Click '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration (JSON)
      description: If applicable, paste the configuration JSON exported via the "Download Configuration" button.
      render: json
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser
      description: Which browser are you using?
      placeholder: e.g. Chrome 125, Firefox 126, Safari 18
    validations:
      required: false
