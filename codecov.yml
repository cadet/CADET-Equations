coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 1%

ignore:
  - "Equation-Generator.py"  # Streamlit entry point, not importable as a module for coverage

comment:
  layout: "reach,diff,flags,components"
  behavior: default
  require_changes: false
